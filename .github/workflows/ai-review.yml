name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: AI Review PR
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install review script deps
        working-directory: .github/scripts
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Run AI review
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          # Choose one provider: openai | anthropic | gemini
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Tuning knobs
          MAX_FILES: ${{ vars.AI_REVIEW_MAX_FILES || '25' }}
          MAX_PATCH_CHARS: ${{ vars.AI_REVIEW_MAX_PATCH_CHARS || '12000' }}
          REVIEW_LANGUAGE: ${{ vars.AI_REVIEW_LANGUAGE || 'English' }}
          AI_REVIEW_CONCURRENCY: ${{ vars.AI_REVIEW_CONCURRENCY || '4' }}
          AI_REVIEW_SKIP_LABELS: ${{ vars.AI_REVIEW_SKIP_LABELS || 'skip-ai-review,no-ai-review' }}
          # Project-specific rules. Prefer committing them to `.github/ai-review-rules.md`;
          # this variable is a quick fallback for short rule sets.
          AI_REVIEW_PROJECT_RULES: ${{ vars.AI_REVIEW_PROJECT_RULES }}
        run: node ai-review.mjs
